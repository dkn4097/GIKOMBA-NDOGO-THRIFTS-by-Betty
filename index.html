<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gikomba Thrift Shop | Mitumba Bales Nairobi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
       
        .slider { position: relative; height: 520px; overflow: hidden; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .slide.active { opacity: 1; }
        .product-card { transition: all 0.4s ease; }
        .product-card:hover { transform: translateY(-12px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🛍️</span>
                <h1 class="text-2xl font-bold text-gray-800">Gikomba Thrift</h1>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="toggleAdmin()" class="text-xl hover:text-red-600"><i class="fas fa-cog"></i></button>
                <button onclick="showCart()" class="flex items-center gap-2 text-xl hover:text-red-600">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="font-bold">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Search -->
    <div class="max-w-7xl mx-auto px-6 py-4">
        <input type="text" id="searchInput" placeholder="Search bales (baby, socks, jeans...)"
               class="w-full p-4 border-2 border-gray-300 rounded-3xl focus:outline-none focus:border-red-500 text-lg"
               onkeyup="filterProducts()">
    </div>

    <!-- Category Filters -->
    <div class="max-w-7xl mx-auto px-6 pb-4 flex gap-3 overflow-x-auto">
        <button onclick="filterByCategory('all')" class="category-btn active px-6 py-3 bg-red-600 text-white rounded-full text-sm whitespace-nowrap">All Bales</button>
        <button onclick="filterByCategory('baby')" class="category-btn px-6 py-3 bg-white hover:bg-gray-100 rounded-full text-sm whitespace-nowrap">Baby</button>
        <button onclick="filterByCategory('kids')" class="category-btn px-6 py-3 bg-white hover:bg-gray-100 rounded-full text-sm whitespace-nowrap">Kids</button>
        <button onclick="filterByCategory('ladies')" class="category-btn px-6 py-3 bg-white hover:bg-gray-100 rounded-full text-sm whitespace-nowrap">Ladies</button>
        <button onclick="filterByCategory('men')" class="category-btn px-6 py-3 bg-white hover:bg-gray-100 rounded-full text-sm whitespace-nowrap">Men</button>
    </div>

    <!-- Auto Image Slider -->
    <section class="slider">
        <div class="slide active"><img src="IMG-20260621-WA0062.jpg" class="w-full h-full object-cover" alt="Baby Bale" onerror="this.src='https://via.placeholder.com/800x500?text=Image+Not+Found'"></div>
        <div class="slide"><img src="IMG-20260621-WA0060.jpg" class="w-full h-full object-cover" alt="Socks Bale" onerror="this.src='https://via.placeholder.com/800x500?text=Image+Not+Found'"></div>
        <div class="slide"><img src="IMG-20260621-WA0055.jpg" class="w-full h-full object-cover" alt="Towel Bale" onerror="this.src='https://via.placeholder.com/800x500?text=Image+Not+Found'"></div>
        <div class="slide"><img src="IMG-20260621-WA0057.jpg" class="w-full h-full object-cover" alt="Kids Sneakers" onerror="this.src='https://via.placeholder.com/800x500?text=Image+Not+Found'"></div>
        <div class="slide"><img src="IMG-20260621-WA0044.jpg" class="w-full h-full object-cover" alt="Jacket Bale" onerror="this.src='https://via.placeholder.com/800x500?text=Image+Not+Found'"></div>
        <div class="slide"><img src="IMG-20260621-WA0058.jpg" class="w-full h-full object-cover" alt="Underwear Bale" onerror="this.src='https://via.placeholder.com/800x500?text=Image+Not+Found'"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent flex items-center justify-center z-10">
            <div class="text-center text-white px-6">
                <h1 class="text-5xl md:text-7xl font-bold mb-4">Fresh Mitumba Bales</h1>
                <p class="text-2xl">Direct from Gikomba • Best Wholesale Prices</p>
            </div>
        </div>
    </section>

    <!-- Products -->
    <section class="max-w-7xl mx-auto px-6 py-12">
        <h2 class="text-4xl font-bold text-center mb-12">Our Latest Bales</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="products-grid"></div>
        
        <!-- Pagination -->
        <div class="flex justify-center gap-4 mt-12">
            <button onclick="prevPage()" class="px-6 py-3 bg-gray-200 hover:bg-gray-300 rounded-2xl">Previous</button>
            <button onclick="nextPage()" class="px-6 py-3 bg-red-600 text-white rounded-2xl">Next Page</button>
        </div>
    </section>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-8 max-w-lg w-full mx-4 max-h-[90vh] overflow-auto">
            <h2 class="text-2xl font-bold mb-6">Admin - Manage Bales</h2>
            <input type="text" id="adminName" placeholder="Bale Name" class="w-full p-4 border rounded-2xl mb-4">
            <input type="number" id="adminPrice" placeholder="Price (KSh)" class="w-full p-4 border rounded-2xl mb-4">
            <input type="text" id="adminImage" placeholder="Image filename or URL" class="w-full p-4 border rounded-2xl mb-4">
            <button onclick="addNewBale()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold mb-3">Add New Bale</button>
            <button onclick="toggleAdmin()" class="w-full bg-gray-500 text-white py-4 rounded-2xl">Close Panel</button>
        </div>
    </div>

    <!-- CART MODAL -->
    <div id="cartModal" class="hidden fixed inset-0 bg-black/70 flex items-end md:items-center justify-center z-50">
        <div class="bg-white w-full md:w-[500px] md:rounded-3xl max-h-[90vh] overflow-auto">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="text-2xl font-bold">Your Cart</h3>
                <button onclick="hideCart()" class="text-3xl">×</button>
            </div>
            <div id="cartItems" class="p-6"></div>
            <div class="p-6 border-t">
                <div class="flex justify-between text-xl font-bold mb-6">
                    <span>Total</span>
                    <span id="cartTotal">KSh 0</span>
                </div>
                <button onclick="buyNow()" class="w-full bg-green-600 text-white py-5 rounded-2xl text-xl font-bold">BUY VIA WHATSAPP</button>
            </div>
        </div>
    </div>

    <footer class="bg-gray-900 text-white py-16 text-center">
        <p class="text-2xl mb-4">Gikomba Thrift Shop</p>
        <p class="mb-8">0104 064092 • 0116 460490</p>
        <a href="https://wa.me/254720399552" target="_blank" class="inline-block bg-green-500 px-12 py-5 rounded-full text-xl font-bold hover:bg-green-600">
            📱 WhatsApp Us Now
        </a>
        <p class="mt-8 text-gray-400">&copy; 2026 Gikomba Thrift Shop • Nairobi, Kenya</p>
    </footer>

    <script>
        // ==================== YOUR ORIGINAL PRODUCTS (KEPT ALL) ====================
        let products = [
            { id: 1, name: "Baby Sleeper Bale", price: 22000, image: "IMG-20260621-WA0062.jpg", category: "baby" },
            { id: 2, name: "Paired Socks Bale", price: 15000, image: "IMG-20260621-WA0060.jpg", category: "kids" },
            { id: 3, name: "Cargo Shorts", price: 25000, image: "cargo shorts.jpg", category: "men" },
            { id: 4, name: "Towel Bale", price: 12800, image: "IMG-20260621-WA0055.jpg", category: "all" },
            { id: 5, name: "Socks Bale", price: 18000, image: "IMG-20260621-WA0059.jpg", category: "kids" },
            { id: 6, name: "Ladies Underwear Bale", price: 12000, image: "IMG-20260621-WA0058.jpg", category: "ladies" },
            { id: 7, name: "Kids Sneakers Bale", price: 18000, image: "IMG-20260621-WA0057.jpg", category: "kids" },
            { id: 8, name: "Baby Blanket Bale", price: 20000, image: "IMG-20260621-WA0056.jpg", category: "baby" },
            { id: 9, name: "Kids Jogging Pant Bale", price: 15000, image: "IMG-20260621-WA0054.jpg", category: "kids" },
            { id: 10, name: "Adult Sneakers Bale", price: 20000, image: "IMG-20260621-WA0051.jpg", category: "men" },
            { id: 11, name: "Curtain Bale", price: 17000, image: "IMG-20260621-WA0050.jpg", category: "all" },
            { id: 12, name: "Ex-UK Children Zipper Bale", price: 27000, image: "IMG-20260621-WA0047.jpg", category: "kids" },
            { id: 13, name: "Sandals Bale", price: 14000, image: "IMG-20260621-WA0045.jpg", category: "all" },
            { id: 14, name: "Children Jacket Bale", price: 22000, image: "IMG-20260621-WA0044.jpg", category: "kids" },
            { id: 15, name: "Adult Raincoats Bale", price: 16000, image: "IMG-20260621-WA0042.jpg", category: "men" },
            { id: 16, name: "Adult Bathrobes", price: 27000, image: "Adult-Bathrobe.webp", category: "ladies" },
            { id: 17, name: "Heavy Baby Rompers", price: 32000, image: "heavy-Baby-Rompers-Blue-915x1024.webp", category: "baby" },
            { id: 18, name: "Ladies Heavy Tight", price: 27000, image: "Heavy-Tight-Pants-for-Ladies-Floral-768x1024.webp", category: "ladies" },
            { id: 19, name: "Ladies Rugged Jeans", price: 25000, image: "Rugged-Jeans-for-Ladies.webp", category: "ladies" },
            { id: 20, name: "Adult Hoods", price: 18000, image: "adult hoods.jpg", category: "men" },
            { id: 21, name: "Baby Jackets", price: 17500, image: "baby jackets.webp", category: "baby" },
            { id: 22, name: "Body Suits Bale", price: 26000, image: "body suits bale.jpg", category: "baby" },
            { id: 23, name: "Children Bathrobes", price: 22000, image: "children bathrobes.webp", category: "kids" },
            { id: 24, name: "children denim jeans", price: 25000, image: "children denim jeans.jpg", category: "kids" },
            { id: 25, name: "children polo t shirts", price: 31500, image: "children polo shirts.jpg", category: "kids" },
            { id: 26, name: "children trank pants", price: 17000, image: "children trank pants.jpg", category: "kids" },
            { id: 27, name: "creme carpet", price: 29000, image: "creame carpet bales.webp", category: "all" },
            { id: 28, name: "creme handbags", price: 34000, image: "creme handbags.jpg", category: "ladies" },
            { id: 29, name: "football boots", price: 45000, image: "football boots.jpg", category: "kids" },
            { id: 30, name: "grade 1 rompers", price: 32000, image: "grade 1 rompers.jpg", category: "baby" },
            { id: 31, name: "ladies gym tights", price: 34200, image: "ladies gym tights.webp", category: "ladies" },
            { id: 32, name: "ladies jeans", price: 22000, image: "ladies jeans.jpg", category: "ladies" },
            { id: 33, name: "ladies official pants", price: 30000, image: "ladies pants official.webp", category: "ladies" },
            { id: 34, name: "leather jackets", price: 23400, image:"leather jacket.jpg", category: "men" },
            { id: 35, name: "long sweaters", price: 26000, image:"long sweaters bale.jpg", category: "ladies" },
            { id: 36, name: "cargo shorts", price: 25000, image:"men cargo shorts.jpg", category: "men" },
            { id: 37, name: "men tank tops", price: 22000, image:"men tank tops bale.jpg", category: "men" },
            { id: 38, name: "mini dress", price: 24000, image:"mini dress.jpg", category: "ladies" },
            { id: 39, name: "polo tshirt", price: 30000, image:"polo tshirts bale.jpg", category: "men" },
            { id: 40, name: "sneakers", price: 18000, image:"sneakers bale.jpg", category: "men" },
            { id: 41, name: "swimming costume", price: 40000, image: "swiming costumes.jpg", category: "ladies" },
            { id: 42, name: "trenchcoats", price: 17600, image: "trenchcoats.jpg", category: "ladies" }
        ];

        let cart = [];
        let currentPage = 1;
        const itemsPerPage = 8;

        function renderProducts(filtered = products) {
            const container = document.getElementById('products-grid');
            container.innerHTML = '';
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filtered.slice(start, end);

            pageItems.forEach(p => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-3xl overflow-hidden shadow-lg product-card";
                div.innerHTML = `
                    <img src="${p.image}" class="w-full h-48 sm:h-64 object-cover" onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'">
                    <div class="p-6">
                        <h3 class="font-semibold text-lg mb-3">${p.name}</h3>
                        <p class="text-3xl font-bold text-green-600 mb-6">KSh ${p.price}</p>
                        <button onclick="addToCart(${p.id}); event.stopImmediatePropagation()" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-semibold transition">
                            Add to Cart
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function addToCart(id) {
            const item = products.find(p => p.id === id);
            cart.push(item);
            document.getElementById('cart-count').textContent = cart.length;
            alert(`✅ ${item.name} added to cart!`);
        }

        function showCart() {
            const modal = document.getElementById('cartModal');
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = '';
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="flex justify-between items-center py-4 border-b">
                        <div>
                            <p class="font-medium">${item.name}</p>
                            <p class="text-green-600">KSh ${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-500 text-xl">×</button>
                    </div>`;
            });
            document.getElementById('cartTotal').textContent = `KSh ${total}`;
            modal.classList.remove('hidden');
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            document.getElementById('cart-count').textContent = cart.length;
            showCart();
        }

        function buyNow() {
            if (cart.length === 0) return;
            let message = "🛒 *New Order from Gikomba Thrift*\n\n";
            let total = 0;
            cart.forEach(item => {
                message += `• ${item.name} - KSh ${item.price}\n`;
                total += item.price;
            });
            message += `\n*Total: KSh ${total}*`;
            window.open(`https://wa.me/254720399552?text=${encodeURIComponent(message)}`, "_blank");
            cart = [];
            document.getElementById('cart-count').textContent = 0;
            document.getElementById('cartModal').classList.add('hidden');
        }

        function hideCart() {
            document.getElementById('cartModal').classList.add('hidden');
        }

        function toggleAdmin() {
            document.getElementById('adminPanel').classList.toggle('hidden');
        }

        function addNewBale() {
            const name = document.getElementById('adminName').value;
            const price = parseInt(document.getElementById('adminPrice').value);
            const image = document.getElementById('adminImage').value || "https://via.placeholder.com/400x300?text=New+Bale";
            if (name && price) {
                products.unshift({ id: Date.now(), name: name, price: price, image: image, category: "all" });
                renderProducts();
                toggleAdmin();
                alert("✅ New bale added successfully!");
            }
        }

        function filterProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        function filterByCategory(cat) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active', 'bg-red-600', 'text-white'));
            event.target.classList.add('active', 'bg-red-600', 'text-white');
            let filtered = cat === 'all' ? products : products.filter(p => p.category === cat);
            renderProducts(filtered);
        }

        function nextPage() {
            currentPage++;
            renderProducts(products);
        }

        function prevPage() {
            if (currentPage > 1) currentPage--;
            renderProducts(products);
        }

        // Image Slider
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        function nextSlide() {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }
        setInterval(nextSlide, 4500);

        window.onload = () => renderProducts();
    </script>
</body>
</html>
