<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gikomba Thrift Shop | Mitumba Bales Nairobi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .slider {
            position: relative;
            height: 520px;
            overflow: hidden;
        }
        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .slide.active {
            opacity: 1;
        }
        .product-card {
            transition: all 0.4s ease;
        }
        .product-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🛍️</span>
                <h1 class="text-2xl font-bold text-gray-800">Gikomba Thrift</h1>
            </div>
            <button onclick="showCart()" class="flex items-center gap-2 text-xl hover:text-red-600">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" class="font-bold">0</span>
            </button>
        </div>
    </nav>

    <!-- Auto Image Slider -->
    <section class="slider">
        <div class="slide active"><img src="IMG-20260621-WA0062.jpg" class="w-full h-full object-cover" alt="Baby Bale"></div>
        <div class="slide"><img src="IMG-20260621-WA0060.jpg" class="w-full h-full object-cover" alt="Socks Bale"></div>
        <div class="slide"><img src="IMG-20260621-WA0055.jpg" class="w-full h-full object-cover" alt="Towel Bale"></div>
        <div class="slide"><img src="IMG-20260621-WA0057.jpg" class="w-full h-full object-cover" alt="Kids Sneakers"></div>
        <div class="slide"><img src="IMG-20260621-WA0044.jpg" class="w-full h-full object-cover" alt="Jacket Bale"></div>
        <div class="slide"><img src="IMG-20260621-WA0058.jpg" class="w-full h-full object-cover" alt="Underwear Bale"></div>

        <!-- Text Overlay -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent flex items-center justify-center z-10">
            <div class="text-center text-white px-6">
                <h1 class="text-5xl md:text-7xl font-bold mb-4">Fresh Mitumba Bales</h1>
                <p class="text-2xl">Direct from Gikomba • Best Wholesale Prices</p>
            </div>
        </div>
    </section>

    <!-- Products -->
    <section class="max-w-7xl mx-auto px-6 py-16">
        <h2 class="text-4xl font-bold text-center mb-12">Our Latest Bales</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="products-grid"></div>
    </section>

    <footer class="bg-gray-900 text-white py-16 text-center">
        <p class="text-2xl mb-4">Gikomba Thrift Shop</p>
        <p class="mb-8">0104 064092 • 0116 460490</p>
        <a href="https://wa.me/254720399552" target="_blank" class="inline-block bg-green-500 px-12 py-5 rounded-full text-xl font-bold hover:bg-green-600">
            📱 WhatsApp Us Now
        </a>
        <p class="mt-8 text-gray-400">&copy; 2026 Gikomba Thrift Shop • Nairobi, Kenya</p>
    </footer>

    <script>
        // Image Slider
        let current = 0;
        const slides = document.querySelectorAll('.slide');

        function nextSlide() {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }
        setInterval(nextSlide, 4500); // Change every 4.5 seconds

        // Products (All 23)
        let products = [
            { id: 1, name: "Baby Sleeper Bale", price: 22000, image: "IMG-20260621-WA0062.jpg" },
            { id: 2, name: "Paired Socks Bale", price: 15000, image: "IMG-20260621-WA0060.jpg" },
            { id: 3, name: "Cargo Shorts", price: 25000, image: "cargo shorts.jpg" },
            { id: 4, name: "Towel Bale", price: 12800, image: "IMG-20260621-WA0055.jpg" },
            { id: 5, name: "Socks Bale", price: 18000, image: "IMG-20260621-WA0059.jpg" },
            { id: 6, name: "Ladies Underwear Bale", price: 12000, image: "IMG-20260621-WA0058.jpg" },
            { id: 7, name: "Kids Sneakers Bale", price: 18000, image: "IMG-20260621-WA0057.jpg" },
            { id: 8, name: "Baby Blanket Bale", price: 20000, image: "IMG-20260621-WA0056.jpg" },
            { id: 9, name: "Kids Jogging Pant Bale", price: 15000, image: "IMG-20260621-WA0054.jpg" },
            { id: 10, name: "Adult Sneakers Bale", price: 20000, image: "IMG-20260621-WA0051.jpg" },
            { id: 11, name: "Curtain Bale", price: 17000, image: "IMG-20260621-WA0050.jpg" },
            { id: 12, name: "Ex-UK Children Zipper Bale", price: 27000, image: "IMG-20260621-WA0047.jpg" },
            { id: 13, name: "Sandals Bale", price: 14000, image: "IMG-20260621-WA0045.jpg" },
            { id: 14, name: "Children Jacket Bale", price: 22000, image: "IMG-20260621-WA0044.jpg" },
            { id: 15, name: "Adult Raincoats Bale", price: 16000, image: "IMG-20260621-WA0042.jpg" },
            { id: 16, name: "Adult Bathrobes", price: 27000, image: "Adult-Bathrobe.webp" },
            { id: 17, name: "Heavy Baby Rompers", price: 32000, image: "heavy-Baby-Rompers-Blue-915x1024.webp" },
            { id: 18, name: "Ladies Heavy Tight", price: 27000, image: "Heavy-Tight-Pants-for-Ladies-Floral-768x1024.webp" },
            { id: 19, name: "Ladies Rugged Jeans", price: 25000, image: "Rugged-Jeans-for-Ladies.webp" },
            { id: 20, name: "Adult Hoods", price: 18000, image: "adult hoods.jpg" },
            { id: 21, name: "Baby Jackets", price: 17500, image: "baby jackets.webp" },
            { id: 22, name: "Body Suits Bale", price: 26000, image: "body suits bale.jpg" },
            { id: 23, name: "Children Bathrobes", price: 22000, image: "children bathrobes.webp" },
            { id: 24, name: "children denim jeans", price: 25000, image: "children denim jeans.jpg"},
            { id: 25, name: "children polo t shirts", price: 31500, image: "children polo shirts.jpg"},
            { id: 26, name: "children trank pants", price: 17000, image: "children trank pants.jpg"},
            { id: 27, name: "creme carpet", price: 29000, image: "creame carpet bales.webp"},
            { id: 28, name: "creme handbags", price: 34000, image: "creme handbags.jpg"},
            { id: 29, name: "football boots", price: 45000, image: "football boots.jpg"},
            { id: 30, name: "grade 1 rompers", price: 32000, image: "grade 1 rompers.jpg"},
            { id: 31, name: "ladies gym tights", price: 34200, image: "ladies gym tights.webp"},
            { id: 32, name: "ladies jeans", price: 22000, image: "ladies jeans.jpg"},
            { id: 33, name: "ladies official pants", price: 30000, image: "ladies pants official.webp"},
        ];

        let cart = [];

        function renderProducts() {
            const container = document.getElementById('products-grid');
            container.innerHTML = '';
            products.forEach(p => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-3xl overflow-hidden shadow-lg product-card";
                div.innerHTML = `
                    <img src="${p.image}" class="w-full h-64 object-cover" onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'">
                    <div class="p-6">
                        <h3 class="font-semibold text-lg mb-3">${p.name}</h3>
                        <p class="text-3xl font-bold text-green-600 mb-6">KSh ${p.price}</p>
                        <button onclick="addToCart(${p.id})" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-semibold transition">
                            Add to Cart
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function addToCart(id) {
            const item = products.find(p => p.id === id);
            cart.push(item);
            document.getElementById('cart-count').textContent = cart.length;
            alert(`✅ ${item.name} added to cart!`);
        }

        function showCart() {
            alert("Cart has " + cart.length + " items. (Demo)");
        }

        window.onload = renderProducts;
    </script>
</body>
</html>
