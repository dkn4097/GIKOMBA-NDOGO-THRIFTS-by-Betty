<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gikomba Thrift Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🛍️ Gikomba Thrift Shop</h1>
        <p>Quality Mitumba at Affordable Prices</p>
        <span onclick="toggleAdmin()" style="position:absolute; top:15px; right:15px; cursor:pointer; font-size:1.5rem;">🔐</span>
    </header>

    <nav>
        <a href="#gikomba market view">Shirts</a>
        <a href="#bales available">Jeans</a>
        <a href="#cargo shorts bale">Jackets</a>
        <a href="#open mixed bale">Shoes</a>
    </nav>

    <section class="hero">
        <h2>Latest Arrivals 🔥</h2>
        <p>Browse our best mitumba collections from Gikomba Market</p>
    </section>

    <section class="products" id="products-container"></section>

    <section class="contact">
        <h2>Contact Us</h2>
        <p>Phone: <strong>0104 064092</strong></p>
        <a class="whatsapp" href="https://wa.me/254720399552" target="_blank">
            📱 Order on WhatsApp
        </a>
    </section>

    <footer>
        <p>&copy; 2026 Gikomba Thrift Shop • Nairobi, Kenya</p>
    </footer>

    <script>
        let products = [
            {
                id: 1,
                name: "Gikomba Market View",
                price: 0,
                image: "attachments/IMG-20260617-WA0016.jpg",
                soldOut: false
            },
            {
                id: 2,
                name: "Bales Wall",
                price: o,
                image: "attachments/IMG-20260617-WA0017.jpg",
                soldOut: false
            },
            {
                id: 3,
                name: "Cargo Shorts Bale",
                price: 6500,
                image: "attachments/IMG-20260617-WA0008.jpg",
                soldOut: false
            },
            {
                id: 4,
                name: "Open Mixed Bale",
                price: 20000,
                image: "attachments/IMG-20260617-WA0010.jpg",
                soldOut: false
            },
            {
                id: 5,
                name: "Baby Clothes",
                price: 20800,
                image: "attachments/IMG-20260617-WA0009.jpg",
                soldOut: false
            }
        ];

        let adminMode = false;

        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            products.forEach(product => {
                const div = document.createElement('div');
                div.className = 'product';
                div.innerHTML = `
                    <div class="image-container">
                        <img src="${product.image}" alt="${product.name}">
                        ${product.soldOut ? '<div class="sold-out">SOLD OUT</div>' : ''}
                    </div>
                    <h3>${product.name}</h3>
                    <p class="price">KSh ${product.price}</p>
                    <button onclick="addToCart(${product.id})" ${product.soldOut ? 'disabled' : ''}>
                        ${product.soldOut ? 'Sold Out' : 'Add to Cart'}
                    </button>
                    ${adminMode ? `
                        <button class="toggle-sold" onclick="toggleSoldOut(${product.id})">
                            ${product.soldOut ? '✅ Mark Available' : '❌ Mark Sold Out'}
                        </button>
                    ` : ''}
                `;
                container.appendChild(div);
            });
        }

        function toggleAdmin() {
            adminMode = !adminMode;
            alert(adminMode ? "🔓 Admin Mode ON" : "🔒 Admin Mode OFF");
            renderProducts();
        }

        function toggleSoldOut(id) {
            const product = products.find(p => p.id === id);
            if (product) product.soldOut = !product.soldOut;
            renderProducts();
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (product) alert(`✅ ${product.name} added! (KSh ${product.price})`);
        }

        window.onload = renderProducts;
    </script>
</body>
</html>
