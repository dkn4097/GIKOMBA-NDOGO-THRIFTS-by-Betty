<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gikomba Thrift Shop | Mitumba Bales Nairobi - By Betty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hero-title { font-family: 'Playfair Display', serif; }
       
        .slider { position: relative; height: 680px; overflow: hidden; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 2.8s ease-in-out; background-size: cover; background-position: center; }
        .slide.active { opacity: 1; }
       
        .product-card { transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .product-card:hover { transform: translateY(-20px) scale(1.04); box-shadow: 0 30px 60px -15px rgb(0 0 0 / 0.3); }
       
        .sold-out::after {
            content: "SOLD OUT";
            position: absolute;
            top: 20px; right: 20px;
            background: #ef4444;
            color: white;
            font-size: 14px;
            font-weight: 800;
            padding: 8px 20px;
            border-radius: 9999px;
            transform: rotate(18deg);
        }
       
        .welcome-text {
            animation: welcomePop 4s ease infinite;
        }
        @keyframes welcomePop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-4xl">🛍️</span>
                <h1 class="text-3xl font-bold text-gray-800">Gikomba Thrift</h1>
            </div>
            <div class="flex items-center gap-8">
                <button onclick="showLogin()" class="flex items-center gap-3 text-2xl hover:text-red-600 transition">
                    <i class="fas fa-cog"></i>
                </button>
                <button onclick="showCart()" class="flex items-center gap-3 text-2xl hover:text-red-600 transition relative">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="absolute -top-1 -right-2 bg-red-600 text-white text-xs w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
                </button>
            </div>
        </div>
    </nav>
    <!-- Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[300]">
        <div class="bg-white rounded-3xl p-12 w-full max-w-md mx-4">
            <h2 class="text-4xl font-bold text-center mb-10">Manager Login</h2>
            <input type="text" id="username" placeholder="Username" class="w-full p-6 border-2 rounded-3xl mb-6 text-xl">
            <input type="password" id="password" placeholder="Password" class="w-full p-6 border-2 rounded-3xl mb-10 text-xl">
            <button onclick="login()" class="w-full bg-red-600 text-white py-6 rounded-3xl text-2xl font-bold">Login</button>
            <button onclick="hideLogin()" class="w-full mt-6 text-gray-500">Cancel</button>
        </div>
    </div>
    <!-- Welcome Banner -->
    <div class="bg-gradient-to-r from-red-600 to-pink-600 text-white py-12 text-center">
        <h1 class="welcome-text text-5xl md:text-6xl font-bold">Welcome to Gikomba Ndogo Thrift Shop by Betty</h1>
    </div>
    <!-- Search -->
    <div class="max-w-7xl mx-auto px-6 py-8">
        <input type="text" id="searchInput" placeholder="Search bales..." class="w-full p-6 border-2 border-gray-300 rounded-3xl text-xl focus:border-red-500 focus:outline-none" onkeyup="filterProducts()">
    </div>
    <!-- Slider -->
    <section class="slider">
        <div class="slide active" style="background-image: url('IMG-20260621-WA0062.jpg')"></div>
        <div class="slide" style="background-image: url('IMG-20260621-WA0060.jpg')"></div>
        <div class="slide" style="background-image: url('IMG-20260621-WA0055.jpg')"></div>
        <div class="slide" style="background-image: url('IMG-20260621-WA0057.jpg')"></div>
        <div class="slide" style="background-image: url('IMG-20260621-WA0044.jpg')"></div>
    </section>
    <!-- Products -->
    <section class="max-w-7xl mx-auto px-6 py-16">
        <h2 class="text-5xl font-bold text-center mb-4">Our Latest Bales</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="products-grid"></div>
       
        <!-- Pagination -->
        <div class="flex justify-center gap-8 mt-16">
            <button onclick="prevPage()" class="px-10 py-5 bg-gray-200 hover:bg-gray-300 rounded-3xl text-xl">Previous</button>
            <span id="pageInfo" class="text-3xl font-semibold py-5">1 / 6</span>
            <button onclick="nextPage()" class="px-10 py-5 bg-red-600 text-white rounded-3xl text-xl">Next</button>
        </div>
    </section>
    <!-- Manager Panel -->
    <div id="adminPanel" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[300]">
        <div class="bg-white rounded-3xl p-12 max-w-4xl w-full mx-4 max-h-[92vh] overflow-auto">
            <div class="flex justify-between mb-10">
                <h2 class="text-4xl font-bold">Manager Dashboard</h2>
                <button onclick="logout()" class="text-red-600 text-3xl">Logout</button>
            </div>
            <div class="flex border-b mb-10">
                <button onclick="switchTab(0)" class="tab-btn active flex-1 py-5 text-xl">Add Bale</button>
                <button onclick="switchTab(1)" class="tab-btn flex-1 py-5 text-xl">Mark Sold Out</button>
                <button onclick="switchTab(2)" class="tab-btn flex-1 py-5 text-xl">Customer Support</button>
            </div>
           
            <div id="tab0" class="tab-content">
                <input type="text" id="adminName" placeholder="Bale Name" class="w-full p-6 border-2 rounded-3xl mb-6 text-xl">
                <input type="number" id="adminPrice" placeholder="Price (KSh)" class="w-full p-6 border-2 rounded-3xl mb-6 text-xl">
                <input type="text" id="adminImage" placeholder="Image filename (e.g. IMG-20260621-WA0062.jpg)" class="w-full p-6 border-2 rounded-3xl mb-10 text-xl">
                <button onclick="addNewBale()" class="w-full bg-green-600 text-white py-7 rounded-3xl text-2xl font-bold">Add New Bale to Website</button>
            </div>
           
            <div id="tab1" class="tab-content hidden">
                <div id="soldOutList" class="space-y-4"></div>
            </div>
           
            <div id="tab2" class="tab-content hidden">
                <h3 class="font-bold text-2xl mb-6">Customer Support Inbox</h3>
                <div id="supportMessages" class="space-y-6 max-h-80 overflow-auto"></div>
                <div class="mt-8">
                    <input type="text" id="replyMessage" placeholder="Type reply to customer..." class="w-full p-6 border-2 rounded-3xl">
                    <button onclick="sendReply()" class="mt-4 w-full bg-blue-600 text-white py-7 rounded-3xl text-xl font-bold">Send Reply via WhatsApp</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Full Cart Modal -->
    <div id="cartModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[300]">
        <div class="bg-white w-full max-w-lg rounded-3xl max-h-[90vh] overflow-hidden">
            <div class="p-8 border-b flex justify-between items-center">
                <h3 class="text-3xl font-bold">Your Cart</h3>
                <button onclick="hideCart()" class="text-4xl">×</button>
            </div>
            <div id="cartItems" class="p-8 overflow-auto" style="max-height: 55vh"></div>
            <div class="p-8 border-t">
                <div class="flex justify-between text-3xl font-bold mb-8">
                    <span>Total</span>
                    <span id="cartTotal">KSh 0</span>
                </div>
                <button onclick="buyNow()" class="w-full py-8 bg-green-600 text-white rounded-3xl text-3xl font-bold">Order via WhatsApp (0720399552)</button>
            </div>
        </div>
    </div>
    <footer class="bg-gray-900 text-white py-20 text-center">
        <p class="text-4xl mb-6">Gikomba Thrift Shop</p>
        <p class="text-2xl mb-10">0104 064092 • 0116 460490</p>
        <a href="https://wa.me/254720399552" target="_blank" class="inline-block bg-green-500 px-16 py-7 rounded-full text-3xl font-bold">WhatsApp Betty</a>
        <p class="mt-16 text-gray-400">&copy; 2026 Gikomba Thrift Shop by Betty • Nairobi</p>
    </footer>
    <script>
        // ==================== ALL 42 PRODUCTS ====================
        let products = [
            { id: 1, name: "Baby Sleeper Bale", price: 22000, image: "IMG-20260621-WA0062.jpg", category: "baby" },
            { id: 2, name: "Paired Socks Bale", price: 15000, image: "IMG-20260621-WA0060.jpg", category: "kids" },
            { id: 3, name: "Cargo Shorts", price: 25000, image: "cargo shorts.jpg", category: "men" },
            { id: 4, name: "Towel Bale", price: 12800, image: "IMG-20260621-WA0055.jpg", category: "all" },
            { id: 5, name: "Socks Bale", price: 18000, image: "IMG-20260621-WA0059.jpg", category: "kids" },
            { id: 6, name: "Ladies Underwear Bale", price: 12000, image: "IMG-20260621-WA0058.jpg", category: "ladies" },
            { id: 7, name: "Kids Sneakers Bale", price: 18000, image: "IMG-20260621-WA0057.jpg", category: "kids" },
            { id: 8, name: "Baby Blanket Bale", price: 20000, image: "IMG-20260621-WA0056.jpg", category: "baby" },
            { id: 9, name: "Kids Jogging Pant Bale", price: 15000, image: "IMG-20260621-WA0054.jpg", category: "kids" },
            { id: 10, name: "Adult Sneakers Bale", price: 20000, image: "IMG-20260621-WA0051.jpg", category: "men" },
            { id: 11, name: "Curtain Bale", price: 17000, image: "IMG-20260621-WA0050.jpg", category: "all" },
            { id: 12, name: "Ex-UK Children Zipper Bale", price: 27000, image: "IMG-20260621-WA0047.jpg", category: "kids" },
            { id: 13, name: "Sandals Bale", price: 14000, image: "IMG-20260621-WA0045.jpg", category: "all" },
            { id: 14, name: "Children Jacket Bale", price: 22000, image: "IMG-20260621-WA0044.jpg", category: "kids" },
            { id: 15, name: "Adult Raincoats Bale", price: 16000, image: "IMG-20260621-WA0042.jpg", category: "men" },
            { id: 16, name: "Adult Bathrobes", price: 27000, image: "Adult-Bathrobe.webp", category: "ladies" },
            { id: 17, name: "Heavy Baby Rompers", price: 32000, image: "heavy-Baby-Rompers-Blue-915x1024.webp", category: "baby" },
            { id: 18, name: "Ladies Heavy Tight", price: 27000, image: "Heavy-Tight-Pants-for-Ladies-Floral-768x1024.webp", category: "ladies" },
            { id: 19, name: "Ladies Rugged Jeans", price: 25000, image: "Rugged-Jeans-for-Ladies.webp", category: "ladies" },
            { id: 20, name: "Adult Hoods", price: 18000, image: "adult hoods.jpg", category: "men" },
            { id: 21, name: "Baby Jackets", price: 17500, image: "baby jackets.webp", category: "baby" },
            { id: 22, name: "Body Suits Bale", price: 26000, image: "body suits bale.jpg", category: "baby" },
            { id: 23, name: "Children Bathrobes", price: 22000, image: "children bathrobes.webp", category: "kids" },
            { id: 24, name: "children denim jeans", price: 25000, image: "children denim jeans.jpg", category: "kids" },
            { id: 25, name: "children polo t shirts", price: 31500, image: "children polo shirts.jpg", category: "kids" },
            { id: 26, name: "children trank pants", price: 17000, image: "children trank pants.jpg", category: "kids" },
            { id: 27, name: "creme carpet", price: 29000, image: "creame carpet bales.webp", category: "all" },
            { id: 28, name: "creme handbags", price: 34000, image: "creme handbags.jpg", category: "ladies" },
            { id: 29, name: "football boots", price: 45000, image: "football boots.jpg", category: "kids" },
            { id: 30, name: "grade 1 rompers", price: 32000, image: "grade 1 rompers.jpg", category: "baby" },
            { id: 31, name: "ladies gym tights", price: 34200, image: "ladies gym tights.webp", category: "ladies" },
            { id: 32, name: "ladies jeans", price: 22000, image: "ladies jeans.jpg", category: "ladies" },
            { id: 33, name: "ladies official pants", price: 30000, image: "ladies pants official.webp", category: "ladies" },
            { id: 34, name: "leather jackets", price: 23400, image: "leather jacket.jpg", category: "men" },
            { id: 35, name: "long sweaters", price: 26000, image: "long sweaters bale.jpg", category: "ladies" },
            { id: 36, name: "cargo shorts", price: 25000, image: "men cargo shorts.jpg", category: "men" },
            { id: 37, name: "men tank tops", price: 22000, image: "men tank tops bale.jpg", category: "men" },
            { id: 38, name: "mini dress", price: 24000, image: "mini dress.jpg", category: "ladies" },
            { id: 39, name: "polo tshirt", price: 30000, image: "polo tshirts bale.jpg", category: "men" },
            { id: 40, name: "sneakers", price: 18000, image: "sneakers bale.jpg", category: "men" },
            { id: 41, name: "swimming costume", price: 40000, image: "swiming costumes.jpg", category: "ladies" },
            { id: 42, name: "trenchcoats", price: 17600, image: "trenchcoats.jpg", category: "ladies" }
        ];

        let cart = [];
        let soldOutIds = [];
        let isLoggedIn = false;
        let currentPage = 1;
        const itemsPerPage = 8;

        // ==================== LOGIN ====================
        function showLogin() {
            document.getElementById('loginModal').classList.remove('hidden');
        }
        function hideLogin() {
            document.getElementById('loginModal').classList.add('hidden');
        }
        function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (user === "betty2024" && pass === "0720") {
                isLoggedIn = true;
                hideLogin();
                alert("✅ Welcome Betty! Manager mode activated.");
                toggleAdmin();
            } else {
                alert("❌ Incorrect username or password!");
            }
        }
        function logout() {
            isLoggedIn = false;
            document.getElementById('adminPanel').classList.add('hidden');
        }

        function toggleAdmin() {
            if (!isLoggedIn) {
                showLogin();
                return;
            }
            document.getElementById('adminPanel').classList.toggle('hidden');
        }

        // ==================== PRODUCTS RENDER + PAGINATION ====================
        function renderProducts() {
            const container = document.getElementById('products-grid');
            container.innerHTML = '';
            const start = (currentPage - 1) * itemsPerPage;
            const end = Math.min(start + itemsPerPage, products.length);
            for (let i = start; i < end; i++) {
                const p = products[i];
                const div = document.createElement('div');
                div.className = `product-card bg-white rounded-3xl overflow-hidden shadow-xl ${soldOutIds.includes(p.id) ? 'sold-out' : ''}`;
                div.innerHTML = `
                    <img src="${p.image}" class="w-full h-64 object-cover" onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'">
                    <div class="p-8">
                        <h3 class="font-semibold text-2xl mb-4">${p.name}</h3>
                        <p class="text-5xl font-bold text-green-600">KSh ${p.price}</p>
                        <button onclick="addToCart(${p.id}); event.stopImmediatePropagation()" class="mt-8 w-full py-6 bg-red-600 text-white rounded-3xl text-xl font-bold">Add to Cart</button>
                    </div>
                `;
                container.appendChild(div);
            }
            document.getElementById('pageInfo').textContent = `${currentPage} / ${Math.ceil(products.length / itemsPerPage)}`;
        }

        function nextPage() {
            if (currentPage * itemsPerPage < products.length) {
                currentPage++;
                renderProducts();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderProducts();
            }
        }

        function addToCart(id) {
            const item = products.find(p => p.id === id);
            if (item) {
                cart.push(item);
                document.getElementById('cart-count').textContent = cart.length;
                alert(`✅ ${item.name} added to cart!`);
            }
        }

        function showCart() {
            const modal = document.getElementById('cartModal');
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = '';
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="flex justify-between items-center py-6 border-b">
                        <div>
                            <p class="font-medium">${item.name}</p>
                            <p class="text-green-600">KSh ${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-500 text-3xl">×</button>
                    </div>`;
            });
            document.getElementById('cartTotal').textContent = `KSh ${total}`;
            modal.classList.remove('hidden');
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            document.getElementById('cart-count').textContent = cart.length;
            showCart();
        }

        function hideCart() {
            document.getElementById('cartModal').classList.add('hidden');
        }

        function buyNow() {
            if (cart.length === 0) return;
            let text = "🛒 *New Order from Gikomba Thrift Shop*\n\n";
            let total = 0;
            cart.forEach(item => {
                text += `• ${item.name} - KSh ${item.price}\n`;
                total += item.price;
            });
            text += `\n*Total: KSh ${total}*`;
            window.open(`https://wa.me/254720399552?text=${encodeURIComponent(text)}`, "_blank");
            cart = [];
            document.getElementById('cart-count').textContent = 0;
            hideCart();
        }

        function addNewBale() {
            const name = document.getElementById('adminName').value.trim();
            const price = parseInt(document.getElementById('adminPrice').value);
            const image = document.getElementById('adminImage').value.trim();
            if (name && price) {
                products.unshift({
                    id: Date.now(),
                    name: name,
                    price: price,
                    image: image || "https://via.placeholder.com/400x300?text=New+Bale",
                    category: "all"
                });
                alert("✅ New bale added and visible on website!");
                renderProducts();
            }
        }

        function sendReply() {
            const msg = document.getElementById('replyMessage').value.trim();
            if (msg) {
                alert("✅ Reply sent to customer via WhatsApp (0720399552)!");
                document.getElementById('replyMessage').value = '';
            }
        }

        function filterProducts() {
            renderProducts();
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab' + n).classList.remove('hidden');
        }

        // Initialize
        window.onload = () => {
            renderProducts();
            // Auto slider
            const slides = document.querySelectorAll('.slide');
            let i = 0;
            setInterval(() => {
                slides.forEach(s => s.classList.remove('active'));
                slides[i].classList.add('active');
                i = (i + 1) % slides.length;
            }, 5000);
        };
    </script>
</body>
</html>
