<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gikomba Thrift Shop | Mitumba Bales Nairobi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .slider { position: relative; height: 520px; overflow: hidden; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .slide.active { opacity: 1; }
        .product-card { transition: all 0.4s ease; }
        .product-card:hover { transform: translateY(-12px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .sold-out::after {
            content: "SOLD OUT";
            position: absolute;
            top: 12px; right: 12px;
            background: #ef4444;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 9999px;
            transform: rotate(12deg);
        }
    </style>
</head>
<body class="bg-gray-50">

            <button onclick="login()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold">Login</button>
            <button onclick="hideLogin()" class="w-full mt-3 text-gray-500">Cancel</button>
        </div>

    <!-- Search -->

               onkeyup="filterProducts()">
    </div>

    <!-- Slider -->
    <section class="slider">
        <div class="slide active"><img src="IMG-20260621-WA0062.jpg" class="w-full h-full object-cover" alt="Baby Bale"></div>
        <div class="slide"><img src="IMG-20260621-WA0060.jpg" class="w-full h-full object-cover" alt="Socks Bale"></div>

        <div class="slide"><img src="IMG-20260621-WA0057.jpg" class="w-full h-full object-cover" alt="Kids Sneakers"></div>

                <p class="text-2xl">Direct from Gikomba • Best Wholesale Prices</p>
            </div>
        </div>
    </section>

    <!-- Products -->
    <section class="max-w-7xl mx-auto px-6 py-12">
        <h2 class="text-4xl font-bold text-center mb-12">Our Latest Bales</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="products-grid"></div>
    </section>

    <!-- Manager Panel -->
    <div id="adminPanel" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[200]">
        <div class="bg-white rounded-3xl p-8 max-w-3xl w-full mx-4 max-h-[90vh] overflow-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold">Manager Dashboard</h2>
                <button onclick="logout()" class="text-red-600 font-medium">Logout</button>
            </div>
            <div class="flex gap-4 border-b mb-6">
                <button onclick="switchTab(0)" class="tab-btn active px-6 py-3 font-medium">Add Bale</button>
                <button onclick="switchTab(1)" class="tab-btn px-6 py-3 font-medium">Sold Out</button>
                <button onclick="switchTab(2)" class="tab-btn px-6 py-3 font-medium">Customer Support</button>
            </div>
            <!-- Add New Bale -->
            <div id="tab0" class="tab-content">
                <input type="text" id="adminName" placeholder="Bale Name" class="w-full p-4 border rounded-2xl mb-4">
                <input type="number" id="adminPrice" placeholder="Price (KSh)" class="w-full p-4 border rounded-2xl mb-4">
                <input type="text" id="adminImage" placeholder="Image filename" class="w-full p-4 border rounded-2xl mb-4">
                <button onclick="addNewBale()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold">Add New Bale</button>
            </div>
            <!-- Sold Out -->
            <div id="tab1" class="tab-content hidden">
                <div id="soldOutList" class="space-y-3"></div>
            </div>
            <!-- Customer Support -->
            <div id="tab2" class="tab-content hidden">
                <h3 class="font-semibold mb-4">Customer Messages</h3>
                <div id="supportMessages" class="space-y-4 max-h-96 overflow-auto border rounded-2xl p-4"></div>
                <div class="mt-6">
                    <input type="text" id="replyMessage" placeholder="Type your reply..." class="w-full p-4 border rounded-2xl">
                    <button onclick="sendReply()" class="mt-3 w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">Send Reply</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="hidden fixed inset-0 bg-black/70 flex items-end md:items-center justify-center z-[200]">
        <div class="bg-white w-full md:w-[500px] md:rounded-3xl max-h-[90vh] overflow-auto">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="text-2xl font-bold">Your Cart</h3>
                <button onclick="hideCart()" class="text-3xl">×</button>
            </div>
            <div id="cartItems" class="p-6"></div>
            <div class="p-6 border-t">
                <div class="flex justify-between text-xl font-bold mb-6">
                    <span>Total</span>
                    <span id="cartTotal">KSh 0</span>
                </div>
                <button onclick="buyNow()" class="w-full bg-green-600 text-white py-5 rounded-2xl text-xl font-bold">BUY VIA WHATSAPP</button>
            </div>
        </div>
    </div>

    <footer class="bg-gray-900 text-white py-16 text-center">
        <p class="text-2xl mb-4">Gikomba Thrift Shop</p>
        <p class="mb-8">0104 064092 • 0116 460490</p>
        <a href="https://wa.me/254720399552" target="_blank" class="inline-block bg-green-500 px-12 py-5 rounded-full text-xl font-bold hover:bg-green-600">
            📱 WhatsApp Us Now
        </a>
        <p class="mt-8 text-gray-400">&copy; 2026 Gikomba Thrift Shop • Nairobi, Kenya</p>
    </footer>

    <script>

            { id: 17, name: "Heavy Baby Rompers", price: 32000, image: "heavy-Baby-Rompers-Blue-915x1024.webp", category: "baby" },

            { id: 23, name: "Children Bathrobes", price: 22000, image: "children bathrobes.webp", category: "kids" },
            { id: 24, name: "children denim jeans", price: 25000, image: "children denim jeans.jpg", category: "kids" },
            { id: 25, name: "children polo t shirts", price: 31500, image: "children polo shirts.jpg", category: "kids" },

            { id: 34, name: "leather jackets", price: 23400, image: "leather jacket.jpg", category: "men" },
            { id: 35, name: "long sweaters", price: 26000, image: "long sweaters bale.jpg", category: "ladies" },
            { id: 36, name: "cargo shorts", price: 25000, image: "men cargo shorts.jpg", category: "men" },
            { id: 37, name: "men tank tops", price: 22000, image: "men tank tops bale.jpg", category: "men" },
            { id: 38, name: "mini dress", price: 24000, image: "mini dress.jpg", category: "ladies" },
            { id: 39, name: "polo tshirt", price: 30000, image: "polo tshirts bale.jpg", category: "men" },
            { id: 40, name: "sneakers", price: 18000, image: "sneakers bale.jpg", category: "men" },
            { id: 41, name: "swimming costume", price: 40000, image: "swiming costumes.jpg", category: "ladies" },
            { id: 42, name: "trenchcoats", price: 17600, image: "trenchcoats.jpg", category: "ladies" }
        ];

        let cart = [];
        let soldOutIds = [];
        let isLoggedIn = false;

        // ==================== LOGIN SYSTEM ====================
        function showLogin() {
            document.getElementById('loginModal').classList.remove('hidden');
        }
        function hideLogin() {
            document.getElementById('loginModal').classList.add('hidden');
        }
        function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (user === "betty2024" && pass === "0720") {
                isLoggedIn = true;
                hideLogin();
                alert("✅ Welcome Betty! Manager mode activated.");
                toggleAdmin();
            } else {
                alert("❌ Incorrect username or password!");
            }
        }
        function logout() {
            isLoggedIn = false;
            document.getElementById('adminPanel').classList.add('hidden');
        }

        function toggleAdmin() {
            if (!isLoggedIn) {
                showLogin();
                return;
            }
            document.getElementById('adminPanel').classList.toggle('hidden');
        }

        // ==================== CORE FUNCTIONS ====================
        function renderProducts() {
            const container = document.getElementById('products-grid');
            container.innerHTML = '';
            products.forEach(p => {
                const div = document.createElement('div');
                div.className = `bg-white rounded-3xl overflow-hidden shadow-lg product-card ${soldOutIds.includes(p.id) ? 'sold-out opacity-75' : ''}`;
                div.innerHTML = `
                    <img src="${p.image}" class="w-full h-48 object-cover" onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'">
                    <div class="p-6">
                        <h3 class="font-semibold text-lg mb-3">${p.name}</h3>
                        <p class="text-3xl font-bold text-green-600 mb-6">KSh ${p.price}</p>
                        <button onclick="addToCart(${p.id}); event.stopImmediatePropagation()" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-semibold">Add to Cart</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function addToCart(id) {
            const item = products.find(p => p.id === id);
            if (item) {
                cart.push(item);
                document.getElementById('cart-count').textContent = cart.length;
                alert(`✅ ${item.name} added to cart!`);
            }
        }

        function showCart() {
            alert("Cart opened (you can expand this later with modal)");
        }

        function hideCart() {
            // Add your modal hide logic here
        }

        function buyNow() {
            alert("Order sent to WhatsApp!");
            cart = [];
            document.getElementById('cart-count').textContent = 0;
        }

        function addNewBale() {
            const name = document.getElementById('adminName').value;
            const price = parseInt(document.getElementById('adminPrice').value);
            const image = document.getElementById('adminImage').value || "https://via.placeholder.com/400x300";
            if (name && price) {
                products.unshift({ id: Date.now(), name, price, image, category: "all" });
                alert("✅ New bale added!");
                renderProducts();
            }
        }

        function sendReply() {
            const input = document.getElementById('replyMessage');
            if (input.value.trim()) {
                alert("✅ Reply sent to customer!");
                input.value = '';
            }
        }

        function filterProducts() {
            renderProducts();
        }

        // Initialize
        window.onload = () => {
            renderProducts();
        };
    </script>
</body>
</html>
